services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    depends_on:
      - postgres
      
  backend:
    build: ./backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend

  gateway:
    image: caddy:latest
    restart: unless-stopped
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
    deploy:
      resources:
        limits:
          cpus: "0.50"   # half a CPU core
          memory: 512M
          
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    env_file:
      - .env
    command:
        - "http"
        - "gateway:80"
    ports:
        - 4040:4040

volumes:
  postgres_data: